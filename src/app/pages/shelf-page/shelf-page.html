<div style="padding: 24px;">
  <h2>Étagères</h2>
  <div style="display: flex; gap: 24px; flex-wrap: wrap;">
    @for (category of categories; track category) {
      <div style="min-width: 200px; background: #f5f5f5; border-radius: 8px; padding: 12px;">
        <h3>{{ category }}</h3>
        <div
          cdkDropList
          [id]="category"
          [cdkDropListConnectedTo]="categories"
          [cdkDropListData]="shelves[category]"
          (cdkDropListDropped)="drop($event, category)"
          style="min-height: 60px;">
          @for (book of shelves[category]; track book.id) {
            <mat-card cdkDrag style="margin-bottom: 8px; cursor: grab;">
              @if (book.cover) {
                <img [src]="book.cover" alt="couverture" style="width:100%; object-fit:cover; border-radius:4px;">
              } @else {
                <mat-card-header>
                  <mat-card-title style="font-size: 14px;">{{ book.title }}</mat-card-title>
                </mat-card-header>
              }
            </mat-card>
          }
        </div>
      </div>
    }
  </div>
</div>
