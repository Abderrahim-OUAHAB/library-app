<!-- s3 -->

<div style="padding: 16px;">
  <mat-checkbox [(ngModel)]="showOnlyAvailable">
    Afficher uniquement les livres disponibles
  </mat-checkbox>

  <div style="display: flex; flex-wrap: wrap; gap: 16px; margin-top: 16px;">
    @for (book of (books$ | async) ?? []; track book.id) {
      @if (!showOnlyAvailable || book.available) {
        <mat-card style="width: 250px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); margin: 8px;">
          <mat-card-header>
            <mat-card-title>{{ book.title }}</mat-card-title>
            <mat-card-subtitle>{{ book.author }}</mat-card-subtitle>
          </mat-card-header>
          <mat-card-content>
            <p>Catégorie : {{ book.category }}</p>
            <p>Année : {{ book.year }}</p>
            <p>{{ book.available ? 'Disponible' : 'Emprunté' }}</p>
          </mat-card-content>
          <mat-card-actions>
            <button mat-button [routerLink]="['/books', book.id]">👁 Détail</button>
            <button mat-icon-button color="warn" (click)="deleteBook(book.id)">
              <mat-icon>delete</mat-icon>
            </button>
          </mat-card-actions>
        </mat-card>
      }
    }
  </div>
</div>
